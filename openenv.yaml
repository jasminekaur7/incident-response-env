spec_version: 1
name: incident-response-env
display_name: "DevOps Incident Response Environment"
version: "1.0.0"
description: >
  Real-world DevOps/SRE environment. AI agent diagnoses production
  incidents from logs and metrics and applies the correct fix.
tags:
  - openenv
  - devops
  - incident-response
  - sre
type: http
runtime:
  language: python
  version: "3.11"
app:
  module: server.app
  object: app
port: 7860
tasks:
  - name: cpu_spike_webserver
    difficulty: easy
    description: "99% CPU spike on web server pod."
    max_steps: 5
    score_range: [0.0, 1.0]
  - name: memory_leak_cascade
    difficulty: medium
    description: "Memory leak cascading into queue backup and payment timeouts."
    max_steps: 6
    score_range: [0.0, 1.0]
  - name: multi_service_outage_red_herring
    difficulty: hard
    description: "DB failover outage with red herrings."
    max_steps: 7
    score_range: [0.0, 1.0]
action_space:
  type: discrete_typed
  fields:
    - name: action_type
      type: string
      enum:
        [
          diagnose,
          restart_service,
          scale_up,
          rollback,
          ignore,
          alert_team,
          inspect_logs,
          kill_process,
          clear_cache,
          redeploy,
        ]
    - name: target
      type: string
    - name: reasoning
      type: string
observation_space:
  type: structured
  fields:
    - name: log_snippet
      type: string
    - name: system_metrics
      type: object
    - name: affected_services
      type: array
    - name: incident_status
      type: string
    - name: feedback
      type: string
    - name: done
      type: boolean
    - name: reward
      type: number
